<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>¿Quién Soy? - Sala Dinámica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="pantalla-inicio" class="pantalla activa">
        <h1>¿Quién Soy?</h1>
        
        <div class="config-section">
            <div class="input-grupo">
                <input type="text" id="input-jugador" placeholder="Nombre del jugador..." autocomplete="off">
                <button id="btn-agregar-jugador">+</button>
            </div>
            <ul id="lista-jugadores-menu"></ul>
        </div>

        <button id="btn-crear-sala">CREAR NUEVA SALA</button>
        <button id="btn-recuperar-sala" class="btn-verde" style="display: none;">RECUPERAR PARTIDA</button>
    </div>

    <div id="pantalla-lobby" class="pantalla">
        <h2>Preparar Ronda <span id="lobby-numero-ronda">1</span></h2>
        
        <div class="config-section">
            <h3>1. Elegir Categoría</h3>
            <select id="selector-categoria"></select>
        </div>

        <div class="config-section">
            <h3>2. Elegir Tiempo</h3>
            <select id="selector-tiempo">
                <option value="30">⏱ 30 Segundos</option>
                <option value="60" selected>⏱ 60 Segundos</option>
                <option value="90">⏱ 90 Segundos</option>
                <option value="120">⏱ 120 Segundos</option>
            </select>
        </div>

        <div class="config-section">
            <h3>3. Orden de los Jugadores</h3>
            <ul id="lista-orden-jugadores"></ul>
        </div>

        <button id="btn-iniciar-ronda">¡INICIAR RONDA!</button>
    </div>

    <div id="pantalla-turno" class="pantalla">
        <h2>Turno de:</h2>
        <h1 id="nombre-turno">Jugador</h1>
        <p>Ronda <span id="numero-ronda">1</span></p>
        <button id="btn-empezar-turno">¡ESTOY LISTO!</button>
    </div>

    <div id="pantalla-juego" class="pantalla">
        <div id="tiempo">60</div>
        <div id="palabra-actual">3</div>
    </div>

    <div id="pantalla-resultados" class="pantalla">
        <h2>Fin del Turno</h2>
        <p>Puntos ganados: <span id="puntos-turno">0</span></p>
        
        <div class="contenedor-listas">
            <div class="columna-lista">
                <h3 class="titulo-verde">✅ Adivinadas</h3>
                <ul id="lista-adivinadas"></ul>
            </div>
            <div class="columna-lista">
                <h3 class="titulo-rojo">❌ Pasadas</h3>
                <ul id="lista-pasadas"></ul>
            </div>
        </div>

        <button id="btn-ver-ranking">Ver Ranking de la Sala</button>
    </div>

    <div id="pantalla-posiciones" class="pantalla">
        <h2>🏆 Ranking Actual</h2>
        <ul id="lista-posiciones"></ul>
        <button id="btn-siguiente-accion">Siguiente Jugador</button>
        <button id="btn-cerrar-sala" class="btn-secundario">Cerrar Sala</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
